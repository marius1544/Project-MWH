<form>
        <label id="filelabel" for="fileinput">
                Upload a PNG image
        </label>
        <br>
        <input type="file" id="fileinput" accept="image/png" required>

        <p id="fileName"></p>
        <img id="preview">
        <p id="drop-text">Or drag and drop a PNG here: </p>
        <p id="uploadStatus"></p>
</form>
